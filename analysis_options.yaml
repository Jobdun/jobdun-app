# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

linter:
  # The lint rules applied to this project can be customized in the
  # section below to disable rules from the `package:flutter_lints/flutter.yaml`
  # included above or to enable additional rules. A list of all available lints
  # and their documentation is published at https://dart.dev/lints.
  #
  # Instead of disabling a lint rule for the entire project in the
  # section below, it can also be suppressed for a single line of code
  # or a specific dart file by using the `// ignore: name_of_lint` and
  # `// ignore_for_file: name_of_lint` syntax on the line or in the file
  # producing the lint.
  rules:
    # avoid_print: false  # Uncomment to disable the `avoid_print` rule
    # prefer_single_quotes: true  # Uncomment to enable the `prefer_single_quotes` rule

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options

# ── Strict-metrics enforcement (see CLAUDE.md → Engineering Standards) ────────
#
# The CLAUDE.md spec calls for hard ceilings on file size, method count,
# nesting, cyclomatic complexity, and named-parameter count. These are
# enforced in two places:
#
#   1. File-size budget (≤400 LOC target, 500 LOC hard ceiling) is enforced
#      by `scripts/validate.sh` (pre-push hook + CI) using a grep over
#      `lib/**/*.dart` against an explicit OVERSIZE_ALLOWLIST. That check
#      fails the pre-push and the CI run if violated.
#
#   2. Method count / nesting / cyclomatic complexity / named-parameter count
#      are NOT enforced by an automated linter. The `dart_code_linter` package
#      that previously implemented these checks was archived by its maintainer
#      in 2024 (see https://github.com/dart-code-checker/dart-code-linter).
#      Modern alternatives (very_good_analysis, solid_lints) cover style
#      hygiene but do not ship configurable metrics for these specific
#      thresholds. Until a replacement metrics linter lands, these rules are
#      enforced at code-review time per the CLAUDE.md spec.
#
# Style hygiene beyond `flutter_lints` is intentionally left for a focused
# cleanup sprint — adding `very_good_analysis` today would surface 100+
# pre-existing infos that aren't load-bearing for the W1-W3 audit fix.
#
# Widget-structure rules (prefer-single-widget-per-file, avoid-returning-
# widgets, no-empty-block) are enforced at code-review time. Reviewers
# should flag any new `Widget Function(...)` returns and any methods that
# render Widget trees — extract a private widget class instead.

name: jobdun
description: "Mobile-first workforce and job matching app for the construction industry."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.5

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.2.3
  flutter_riverpod: ^3.3.1
  supabase_flutter: ^2.12.4

  # Architecture
  equatable: ^2.0.7
  fpdart: ^1.1.0

  # Code generation annotations (run: dart run build_runner build)
  # Note: freezed_annotation added back when freezed 3.x resolves with riverpod 3.x
  json_annotation: ^4.9.0

  # Utilities
  intl: ^0.20.2
  connectivity_plus: ^6.1.4
  shared_preferences: ^2.3.5

  # Media
  image_picker: ^1.1.2
  file_picker: ^8.1.6
  cached_network_image: ^3.4.1

  # UX — Core
  url_launcher: ^6.3.1
  flutter_dotenv: ^6.0.1
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.0.0
  crypto: ^3.0.7

  # === UI/UX — Animations & Motion ===
  flutter_animate: ^4.5.0
  lottie: ^3.3.1
  animations: ^2.0.11

  # === UI/UX — Typography & Icons ===
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.14

  # === UI/UX — Responsive Layout ===
  flutter_screenutil: ^5.9.3
  gap: ^3.0.1

  # === UI/UX — Loading & Skeleton States ===
  shimmer: ^3.0.0
  skeletonizer: ^2.1.3

  # === UI/UX — Components ===
  smooth_page_indicator: ^1.2.0
  flutter_slidable: ^3.1.1
  badges: ^3.1.2
  percent_indicator: ^4.2.3
  expandable: ^5.0.1
  flutter_staggered_animations: ^1.1.1
  modal_bottom_sheet: ^3.0.0

  # === UI/UX — Forms & Input ===
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.1.2
  pinput: ^5.0.0

  # === UI/UX — Media & Image Handling ===
  photo_view: ^0.15.0
  flutter_image_compress: ^2.3.0
  image_cropper: ^8.0.2

  # === UI/UX — Data Display ===
  fl_chart: ^0.69.0
  flutter_rating_bar: ^4.0.1
  table_calendar: ^3.1.2
  infinite_scroll_pagination: ^4.1.0

  # === Maps ===
  # OpenStreetMap data via the flutter_map renderer + Carto raster basemap tiles.
  # No API key required for dev. See docs/MAP_USAGE_AUDIT.md before launch —
  # Carto's free tier is non-commercial.
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # === Device location ===
  # geolocator handles permission + position fetch on both platforms. We only
  # request whileInUse — background location is NOT used. Android needs
  # ACCESS_FINE_LOCATION/ACCESS_COARSE_LOCATION in AndroidManifest; iOS needs
  # NSLocationWhenInUseUsageDescription in Info.plist.
  geolocator: ^13.0.4

  # === Geocoding (MapTiler) ===
  # Plain HTTP client for the MapTiler Geocoding REST API used by JPlaceField.
  # Already transitive via supabase_flutter — declared here so the version we
  # use is intentional and pinned. No new native dependency.
  http: ^1.2.2

  # === Legal document rendering ===
  flutter_markdown_plus: ^1.0.5
  phosphor_flutter: ^2.1.0

  # === Crash reporting / observability ===
  # Catches unhandled exceptions from the Flutter engine and the runZonedGuarded
  # zone wrapping runApp(); also installs a custom ErrorWidget.builder that
  # replaces the red-yellow build-error screen with a Jobdun-themed fallback.
  # Inert when SENTRY_DSN is empty so dev builds without the key still run.
  sentry_flutter: ^8.10.1
  path_drawing: ^1.0.1
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  flutter_secure_storage: ^10.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.4
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.

# App launcher icon — regenerate with: dart run flutter_launcher_icons
# Source is a full-bleed orange square + white hammer-J; the OS masks the
# corners. A proper Android adaptive icon (transparent-J foreground + orange
# background) can be added once a transparent-PNG export is available.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/jobdun-icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21

# Cold-start splash — dark brand background so there's no white flash before the
# Flutter app boots (the Flutter splash_page then renders the hammer-J mark). On
# Android 12+ the system shows the launcher icon on this background automatically.
# Regenerate with: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#0F172A"
  android_12:
    color: "#0F172A"

flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - .env
    - assets/legal/
    - assets/images/ftue/
    - lib/core/assets/
    - lib/core/assets/logo-concepts/hammer-j-above/
    - lib/core/assets/logo-concepts/hammer-j-fused/
    - lib/core/assets/logo-concepts/hammer-j-side/
    - lib/core/assets/logo-concepts/hammer-j-head/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

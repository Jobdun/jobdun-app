<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  html, body { margin:0; padding:0; background:#F4F6F8; }
  body { padding: 24px; box-sizing: border-box; width: 700px; font-family:'Barlow',sans-serif; }
  .row { display:flex; align-items:center; gap:14px; padding:6px 0; }
  .label { font-size:11px; font-weight:600; color:#A0ACB8; letter-spacing:0.08em; text-transform:uppercase; min-width:50px; }
  .bar { background:#CC4A10; height:14px; border-radius:3px; }
  .px { font-family:'Barlow Condensed'; font-size:13px; font-weight:600; color:#5A6872; letter-spacing:0.04em; }
  .top { font-size:10px; font-weight:600; color:#A0ACB8; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:12px; }
</style></head><body>
<div class="top">Spacing · 4pt grid</div>
<div class="row"><div class="label">xs</div><div class="bar" style="width:4px"></div><div class="px">4 · icon gap</div></div>
<div class="row"><div class="label">sm</div><div class="bar" style="width:8px"></div><div class="px">8 · badge rows</div></div>
<div class="row"><div class="label">md</div><div class="bar" style="width:12px"></div><div class="px">12 · icon→label</div></div>
<div class="row"><div class="label">lg</div><div class="bar" style="width:16px"></div><div class="px">16 · card padding</div></div>
<div class="row"><div class="label">xl</div><div class="bar" style="width:20px"></div><div class="px">20 · screen padding (always)</div></div>
<div class="row"><div class="label">2xl</div><div class="bar" style="width:32px"></div><div class="px">32 · card group spacing</div></div>
<div class="row"><div class="label">3xl</div><div class="bar" style="width:48px"></div><div class="px">48 · min touch target</div></div>
</body></html>

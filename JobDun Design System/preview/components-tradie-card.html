<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:#F4F6F8; }
  body { padding: 20px; box-sizing: border-box; width: 700px; }
  .top { font-family:'Barlow'; font-size:10px; font-weight:600; color:#A0ACB8; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:14px; }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
  .info { display:flex; flex-direction:column; gap:2px; flex:1; min-width:0; }
  .name-row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .name { font-family:'Barlow';font-weight:600;font-size:16px;color:#252D34; }
  .rating { font-family:'Barlow Condensed';font-weight:700;font-size:18px;color:#252D34;line-height:1; }
  .rating-d { font-family:'Barlow';font-size:11px;color:#A0ACB8; }
  .trade { font-family:'Barlow';font-size:13px;color:#5A6872; }
  .jobs { font-family:'Barlow';font-size:11px;color:#A0ACB8; }
  .top-row { display:flex;gap:12px;align-items:flex-start; }
  .divider { height:1px;background:#D4D9DF;margin:12px 0; }
  .footer { display:flex;align-items:center;gap:8px;font-family:'Barlow';font-size:11px;font-weight:600; }
</style></head><body>
<div class="top">Tradie cards · available + offline</div>
<div class="grid">
  <div class="gv-card">
    <div class="top-row">
      <div class="gv-avatar">MK</div>
      <div class="info">
        <div class="name-row">
          <div class="name">Marcus K.</div>
          <div><span class="rating">4.9</span><span class="rating-d">/5</span></div>
        </div>
        <div class="trade">Electrician · Fitzroy</div>
        <div class="jobs">142 jobs completed</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="footer">
      <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#0D8A5A"></span>
      <span style="color:#0D6644">Available</span>
      <span style="color:#D4D9DF">·</span>
      <span style="color:#0D6644">✓ Verified</span>
      <span class="gv-distance" style="margin-left:auto">3.2 km</span>
    </div>
  </div>
  <div class="gv-card" style="opacity:0.45">
    <div class="top-row">
      <div class="gv-avatar" style="background:#5A6872">SD</div>
      <div class="info">
        <div class="name-row">
          <div class="name">Sarah D.</div>
          <div><span class="rating">4.7</span><span class="rating-d">/5</span></div>
        </div>
        <div class="trade">Plumber · Brunswick</div>
        <div class="jobs">88 jobs completed</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="footer">
      <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#A0ACB8"></span>
      <span style="color:#A0ACB8">Offline</span>
    </div>
  </div>
</div>
</body></html>

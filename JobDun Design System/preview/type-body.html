<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">

<style>
  html, body { margin: 0; padding: 0; background: #F4F6F8; }
  body { padding: 24px; box-sizing: border-box; width: 700px; }
  .specimen { display: flex; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px solid #EAEEF2; }
  .specimen:last-child { border-bottom: none; }
  .meta { font-family: 'Barlow', sans-serif; font-size: 10px; font-weight: 600; color: #A0ACB8; letter-spacing: 0.08em; text-transform: uppercase; min-width: 110px; }
  .label-top { font-family: 'Barlow', sans-serif; font-size: 10px; font-weight: 600; color: #A0ACB8; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="label-top">Body + UI · Barlow</div>

</div>
<div class="specimen">
  <div class="meta">H3 16/600</div>
  <div style="font-family:'Barlow';font-weight:600;font-size:16px;color:#252D34">Marcus Kowalski</div>
</div>

</div>

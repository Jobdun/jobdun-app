<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #F4F6F8; }
  body { padding: 24px; box-sizing: border-box; width: 700px; }
  .specimen { display: flex; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px solid #EAEEF2; }
  .specimen:last-child { border-bottom: none; }
  .meta { font-family: 'Barlow', sans-serif; font-size: 10px; font-weight: 600; color: #A0ACB8; letter-spacing: 0.08em; text-transform: uppercase; min-width: 110px; }
  .label-top { font-family: 'Barlow', sans-serif; font-size: 10px; font-weight: 600; color: #A0ACB8; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="label-top">Display + Headings · Barlow Condensed 700</div>
<div class="specimen">
  <div class="meta">Display 40/700</div>
  <div style="font-family:'Barlow Condensed';font-weight:700;font-size:40px;line-height:1;letter-spacing:0.02em;color:#252D34">FIND A TRADIE</div>
</div>
<div class="specimen">
  <div class="meta">H1 28/700</div>
  <div style="font-family:'Barlow Condensed';font-weight:700;font-size:28px;line-height:1;letter-spacing:0.02em;color:#252D34">JOBS NEARBY</div>
</div>
<div class="specimen">
  <div class="meta">Stat 20/700</div>
  <div style="font-family:'Barlow Condensed';font-weight:700;font-size:20px;line-height:1;letter-spacing:0.02em;color:#252D34">$85/hr · 4.9 · 142 jobs</div>
</div>
</body></html>

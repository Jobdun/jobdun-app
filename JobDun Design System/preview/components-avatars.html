<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:#F4F6F8; }
  body { padding: 20px; box-sizing: border-box; width: 700px; }
  .top { font-family:'Barlow'; font-size:10px; font-weight:600; color:#A0ACB8; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:14px; }
  .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  .av { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .nm { font-family:'Barlow';font-size:10px;color:#5A6872;font-weight:600; }
</style></head><body>
<div class="top">Avatars · 10px radius · never circular</div>
<div class="row">
  <div class="av"><div class="gv-avatar" style="background:#252D34">MK</div><div class="nm">Foundation</div></div>
  <div class="av"><div class="gv-avatar" style="background:#1A7AD4">SD</div><div class="nm">Available blue</div></div>
  <div class="av"><div class="gv-avatar" style="background:#0D8A5A">JT</div><div class="nm">Verified green</div></div>
  <div class="av"><div class="gv-avatar" style="background:#CC4A10">RB</div><div class="nm">Action</div></div>
  <div class="av"><div class="gv-avatar" style="background:#5A6872;width:50px;height:50px;font-size:16px">AH</div><div class="nm">Large 50px</div></div>
  <div class="av"><div class="gv-avatar" style="background:#252D34;width:72px;height:72px;border-radius:12px;font-size:22px">EW</div><div class="nm">Profile 72px</div></div>
</div>
</body></html>

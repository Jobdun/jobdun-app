<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #F4F6F8; }
  body { padding: 20px; box-sizing: border-box; width: 700px; }
  .row { display: flex; gap: 12px; }
  .col { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 48px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.06); }
  .pair { display: flex; gap: 6px; }
  .pair > div { flex: 1; height: 28px; border-radius: 6px; }
  .name { font-family: 'Barlow', sans-serif; font-size: 12px; font-weight: 600; color: #252D34; }
  .hex { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600; color: #5A6872; letter-spacing: 0.04em; }
  .label { font-family: 'Barlow', sans-serif; font-size: 10px; font-weight: 600; color: #A0ACB8; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 14px; }
</style>
</head>
<body>
<div class="label">Semantic · Status (fixed across light + dark)</div>
<div class="row">
  <div class="col">
    <div class="chip" style="background:#0D8A5A"></div>
    <div class="name">Verified</div>
    <div class="hex">#0D8A5A</div>
    <div class="pair"><div style="background:#E6F7F1"></div><div style="background:#0D6644"></div></div>
  </div>
  <div class="col">
    <div class="chip" style="background:#C73B2E"></div>
    <div class="name">Urgent</div>
    <div class="hex">#C73B2E</div>
    <div class="pair"><div style="background:#FDECEA"></div><div style="background:#A32E24"></div></div>
  </div>
  <div class="col">
    <div class="chip" style="background:#1A7AD4"></div>
    <div class="name">Available</div>
    <div class="hex">#1A7AD4</div>
    <div class="pair"><div style="background:#E6F3FF"></div><div style="background:#1254A0"></div></div>
  </div>
</div>
</body></html>

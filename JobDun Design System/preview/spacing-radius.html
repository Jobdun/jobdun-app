<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  html, body { margin:0; padding:0; background:#F4F6F8; }
  body { padding: 24px; box-sizing: border-box; width: 700px; font-family:'Barlow',sans-serif; }
  .grid { display:grid; grid-template-columns: repeat(6, 1fr); gap:14px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .shape { background:#252D34; }
  .name { font-size:11px; font-weight:600; color:#252D34; }
  .px { font-family:'Barlow Condensed'; font-size:11px; font-weight:600; color:#5A6872; letter-spacing:0.04em; }
  .top { font-size:10px; font-weight:600; color:#A0ACB8; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:14px; }
</style></head><body>
<div class="top">Border-radius scale</div>
<div class="grid">
  <div class="item"><div class="shape" style="width:60px;height:48px;border-radius:5px"></div><div class="name">sm</div><div class="px">5 · badge</div></div>
  <div class="item"><div class="shape" style="width:60px;height:48px;border-radius:8px"></div><div class="name">md</div><div class="px">8 · chip</div></div>
  <div class="item"><div class="shape" style="width:60px;height:48px;border-radius:9px"></div><div class="name">btn</div><div class="px">9 · button</div></div>
  <div class="item"><div class="shape" style="width:60px;height:48px;border-radius:10px"></div><div class="name">input</div><div class="px">10 · input</div></div>
  <div class="item"><div class="shape" style="width:60px;height:48px;border-radius:14px"></div><div class="name">card</div><div class="px">14 · max</div></div>
  <div class="item"><div class="shape" style="width:60px;height:48px;border-radius:28px"></div><div class="name">screen</div><div class="px">28 · phone</div></div>
</div>
</body></html>

<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #0E1216; }
  body { padding: 20px; box-sizing: border-box; width: 700px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .swatch { display: flex; flex-direction: column; gap: 4px; }
  .chip { height: 48px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.06); }
  .name { font-family: 'Barlow', sans-serif; font-size: 11px; font-weight: 600; color: #E8ECF2; }
  .hex { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600; color: #7A8898; letter-spacing: 0.04em; }
  .label { font-family: 'Barlow', sans-serif; font-size: 10px; font-weight: 600; color: #505C68; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="label">Dark · Surfaces + Text</div>
<div class="grid">
  <div class="swatch"><div class="chip" style="background:#0E1216"></div><div class="name">bg</div><div class="hex">#0E1216</div></div>
  <div class="swatch"><div class="chip" style="background:#1C2428"></div><div class="name">surf</div><div class="hex">#1C2428</div></div>
  <div class="swatch"><div class="chip" style="background:#252D34"></div><div class="name">card</div><div class="hex">#252D34</div></div>
  <div class="swatch"><div class="chip" style="background:#303A44"></div><div class="name">border</div><div class="hex">#303A44</div></div>
  <div class="swatch"><div class="chip" style="background:#E8ECF2"></div><div class="name">text-1</div><div class="hex">#E8ECF2</div></div>
  <div class="swatch"><div class="chip" style="background:#7A8898"></div><div class="name">text-2</div><div class="hex">#7A8898</div></div>
  <div class="swatch"><div class="chip" style="background:#505C68"></div><div class="name">text-3</div><div class="hex">#505C68</div></div>
  <div class="swatch"><div class="chip" style="background:#CC4A10"></div><div class="name">btn-pri (flips)</div><div class="hex">#CC4A10</div></div>
</div>
</body></html>

<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:#F4F6F8; }
  body { padding: 20px; box-sizing: border-box; width: 700px; }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }
  .top { font-family:'Barlow'; font-size:10px; font-weight:600; color:#A0ACB8; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:14px; }
</style></head><body>
<div class="top">Filter chips + search</div>
<div class="row">
  <button class="gv-chip gv-chip-on">All</button>
  <button class="gv-chip gv-chip-off">Electrician</button>
  <button class="gv-chip gv-chip-off">Plumber</button>
  <button class="gv-chip gv-chip-off">Carpenter</button>
  <button class="gv-chip gv-chip-off">Tiler</button>
  <button class="gv-chip gv-chip-off">Painter</button>
</div>
<div class="gv-search">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#A0ACB8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
  <span class="gv-search-placeholder">Search trades or skills…</span>
</div>
</body></html>

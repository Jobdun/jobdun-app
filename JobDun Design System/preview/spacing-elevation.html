<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  html, body { margin:0; padding:0; background:#F4F6F8; }
  body { padding: 24px; box-sizing: border-box; width: 700px; font-family:'Barlow',sans-serif; }
  .stack { display:flex; gap:24px; align-items:flex-end; }
  .layer { padding: 16px 18px; border:1px solid #D4D9DF; border-radius:14px; font-size:13px; font-weight:600; color:#252D34; }
  .l1 { background:#F4F6F8; }
  .l2 { background:#EAEEF2; }
  .l3 { background:#FFFFFF; }
  .top { font-size:10px; font-weight:600; color:#A0ACB8; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:14px; }
  .note { font-size:11px; font-weight:500; color:#5A6872; margin-top:10px; line-height:1.6; }
</style></head><body>
<div class="top">Elevation · borders, not shadows</div>
<div class="stack">
  <div class="layer l1">bg #F4F6F8</div>
  <div class="layer l2">surf #EAEEF2</div>
  <div class="layer l3">card #FFFFFF</div>
</div>
<div class="note">Three steps build elevation through bg colour + 1px border. Box-shadow is reserved for the sticky CTA bar only.</div>
</body></html>

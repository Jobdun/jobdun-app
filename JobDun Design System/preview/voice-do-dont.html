<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:#F4F6F8; }
  body { padding: 20px; box-sizing: border-box; width: 700px; font-family:'Barlow'; }
  .top { font-size:10px; font-weight:600; color:#A0ACB8; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:14px; }
  .tile { padding:16px; background:#FFF; border:1px solid #D4D9DF; border-radius:14px; margin-bottom:10px; }
  .h { font-family:'Barlow';font-weight:600;font-size:14px;color:#252D34;margin-bottom:4px; }
  .b { font-family:'Barlow';font-size:13px;color:#5A6872;line-height:1.5; }
  .a { font-family:'Barlow';font-size:11px;font-weight:600;color:#CC4A10;margin-top:6px; }
  .x { font-family:'Barlow';font-size:11px;font-weight:600;color:#A0ACB8;margin-top:6px;text-decoration:line-through; }
  .tag { display:inline-block;font-size:9px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:2px 6px;border-radius:3px;margin-bottom:6px; }
  .tag-do { background:#E6F7F1;color:#0D6644; }
  .tag-no { background:#FDECEA;color:#A32E24; }
</style></head><body>
<div class="top">Voice · do / don't</div>
<div class="tile">
  <div class="tag tag-do">DO</div>
  <div class="h">Job posted. 3 tradies notified.</div>
  <div class="b">Direct, specific, calm. Numbers as digits.</div>
</div>
<div class="tile">
  <div class="tag tag-no">DON'T</div>
  <div class="h" style="color:#A0ACB8">Your job is live! Let the magic begin 🎉</div>
  <div class="b">Exclamations, emoji, vague hype. Off-brand.</div>
</div>
</body></html>

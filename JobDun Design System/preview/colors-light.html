<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #F4F6F8; }
  body { padding: 20px; box-sizing: border-box; width: 700px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .swatch { display: flex; flex-direction: column; gap: 4px; }
  .chip { height: 48px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.06); }
  .name { font-family: 'Barlow', sans-serif; font-size: 11px; font-weight: 600; color: #252D34; }
  .hex { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600; color: #5A6872; letter-spacing: 0.04em; }
  .label { font-family: 'Barlow', sans-serif; font-size: 10px; font-weight: 600; color: #A0ACB8; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="label">Light · Surfaces + Text</div>
<div class="grid">
  <div class="swatch"><div class="chip" style="background:#F4F6F8"></div><div class="name">bg</div><div class="hex">#F4F6F8</div></div>
  <div class="swatch"><div class="chip" style="background:#EAEEF2"></div><div class="name">surf</div><div class="hex">#EAEEF2</div></div>
  <div class="swatch"><div class="chip" style="background:#FFFFFF"></div><div class="name">card</div><div class="hex">#FFFFFF</div></div>
  <div class="swatch"><div class="chip" style="background:#D4D9DF"></div><div class="name">border</div><div class="hex">#D4D9DF</div></div>
  <div class="swatch"><div class="chip" style="background:#252D34"></div><div class="name">text-1</div><div class="hex">#252D34</div></div>
  <div class="swatch"><div class="chip" style="background:#5A6872"></div><div class="name">text-2</div><div class="hex">#5A6872</div></div>
  <div class="swatch"><div class="chip" style="background:#A0ACB8"></div><div class="name">text-3</div><div class="hex">#A0ACB8</div></div>
  <div class="swatch"><div class="chip" style="background:#252D34;border:1px solid #D4D9DF"></div><div class="name">btn-pri</div><div class="hex">#252D34</div></div>
</div>
</body></html>

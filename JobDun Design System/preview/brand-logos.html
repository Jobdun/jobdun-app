<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  html, body { margin:0; padding:0; background:#F4F6F8; }
  body { padding: 24px; box-sizing: border-box; width: 700px; font-family:'Barlow'; }
  .top { font-size:10px; font-weight:600; color:#A0ACB8; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:14px; }
  .row { display:flex; gap:18px; align-items:center; }
  .lg { display:flex; align-items:center; justify-content:center; padding:10px 14px; border-radius:10px; }
  .nm { font-family:'Barlow';font-size:11px;font-weight:600;color:#5A6872;margin-top:8px; }
</style></head><body>
<div class="top">Logo · primary, mono, mark</div>
<div class="row">
  <div>
    <div class="lg" style="background:#F4F6F8"><img src="../assets/logo-jobdun.svg" width="200"></div>
    <div class="nm" style="text-align:center">Primary · light</div>
  </div>
  <div>
    <div class="lg" style="background:#252D34"><img src="../assets/logo-jobdun-mono.svg" width="200"></div>
    <div class="nm" style="text-align:center">Mono · dark</div>
  </div>
  <div>
    <div class="lg" style="background:#F4F6F8"><img src="../assets/mark-jobdun.svg" width="64"></div>
    <div class="nm" style="text-align:center">App mark</div>
  </div>
</div>
</body></html>

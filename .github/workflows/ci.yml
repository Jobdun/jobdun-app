name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  flutter:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # pubspec bundles `.env` as a flutter_dotenv asset; the real file is
      # gitignored, so stub it or `flutter analyze` raises a fatal
      # asset_does_not_exist warning on every CI run.
      - name: Stub gitignored .env asset
        run: touch .env

      - name: Install dependencies
        run: flutter pub get

      # Mirror scripts/validate.sh — fail CI on any unformatted file so the
      # pre-push hook isn't the only line of defence. Same flag the local
      # pre-push uses, so contributors get identical feedback either way.
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test test/features/

  schema-diff:
    name: Schema drift
    # Only run on main and on PRs into main. Avoids hitting the live
    # Supabase project on every push to feature branches.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Diff remote schema vs supabase/schema.sql
        env:
          # The Supabase CLI reads the env var SUPABASE_ACCESS_TOKEN; the
          # GitHub secret is named SUPABASE_TOKEN to match what was already
          # set up in the repo. SUPABASE_DB_PASSWORD is optional — only
          # needed if `supabase db dump --linked` prompts for it.
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_TOKEN secret is not set — add it in Settings → Secrets to enable this job."
            exit 1
          fi
          # `--linked` reads the project ref from supabase/.temp (gitignored;
          # written by `supabase link` locally) — recreate it for CI.
          mkdir -p supabase/.temp
          echo "zethpanvkfyijislxesn" > supabase/.temp/project-ref
          bash scripts/schema-diff.sh
